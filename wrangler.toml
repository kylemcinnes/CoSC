# Cloudflare Workers config for churchofsecondchances.ca — used by Wrangler with the
# @opennextjs/cloudflare adapter. `main` is the Worker bundle; ASSETS serves files from
# `.open-next/assets` after `opennextjs-cloudflare build`. Deploy via `npm run deploy`.

name = "cosc"
# OpenNext output — required with `assets.binding` (otherwise Wrangler treats this as assets-only).
main = ".open-next/worker.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Required for Next.js static assets and assets binding
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[observability]
enabled = true
